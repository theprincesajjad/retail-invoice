name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file executable
        run: >
          pyinstaller --name "RetailInvoice" --onefile --windowed --noconfirm --clean
          --add-data "assets;assets"
          --add-data "VERSION;."
          --collect-all customtkinter
          --hidden-import customtkinter
          --hidden-import pywin32
          --hidden-import PIL
          --hidden-import escpos
          --hidden-import win32print
          --hidden-import win32api
          --hidden-import reportlab
          --hidden-import reportlab.pdfgen.canvas
          main.py

      - name: Rename release binary
        shell: bash
        run: |
          cp dist/RetailInvoice.exe "dist/RetailInvoice-${{ steps.version.outputs.version }}-Windows.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Retail Invoice ${{ steps.version.outputs.version }}
          body: |
            ## Retail Invoice System ${{ steps.version.outputs.version }}

            Download **RetailInvoice-${{ steps.version.outputs.version }}-Windows.exe**, run it on Windows — no install required.

            ### What's included
            - DOS-style green-on-black UI
            - Full keyboard shortcuts (F1–F4 tabs, Alt+ shortcuts)
            - Invoice creation, inventory, reports, and reprints
            - Thermal receipt printing (configure printer in Settings)

            ### Requirements
            - Windows 10/11
            - Receipt printer configured in Settings (optional)
          files: dist/RetailInvoice-${{ steps.version.outputs.version }}-Windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
